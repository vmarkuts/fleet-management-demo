<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>FleetPro — Fleet Management</title>
    <meta
      name="description"
      content="FleetPro: Modern fleet management for trucking and logging operations. Track units, maintenance, documents, and drivers in one place."
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <div class="app-shell">
      <div id="app">
        <div class="screen" id="screen-dashboard">
          <nav class="nav">
            <div class="nav-logo">
              <div class="nav-logo-icon">🚛</div>
              <div class="nav-logo-text">Fleet<span>Pro</span></div>
            </div>
            <div class="nav-actions">
              <button class="nav-btn" id="notif-btn" type="button" aria-label="Notifications">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
                  <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
                </svg>
                <span class="badge" id="notif-badge">0</span>
              </button>
            </div>
          </nav>

          <div class="page-content">
            <div class="alert-banner">
              <div class="alert-banner-header">
                <div class="alert-dot"></div>
                <div class="alert-banner-title">Requires Attention</div>
              </div>
              <div class="alert-items">
                <div class="alert-item">
                  <div class="alert-item-icon red">🔴</div>
                  <span><strong>2 trucks</strong> have overdue maintenance</span>
                </div>
                <div class="alert-item">
                  <div class="alert-item-icon yellow">🟡</div>
                  <span><strong>3 documents</strong> expire within 7 days</span>
                </div>
                <div class="alert-item">
                  <div class="alert-item-icon yellow">🟡</div>
                  <span><strong>1 driver</strong> license expires in 12 days</span>
                </div>
              </div>
            </div>

            <div class="section-label">
              Active Fleet
              <span class="section-label-count" id="fleet-count">0 Units</span>
            </div>

            <div class="truck-list" id="truck-list"></div>
          </div>
        </div>

        <div class="screen" id="screen-unit">
          <nav class="nav">
            <button class="nav-back" id="back-btn" type="button" aria-label="Back">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M15 18l-6-6 6-6"></path>
              </svg>
            </button>
            <div class="nav-title" id="unit-nav-title">Unit Detail</div>
            <button class="nav-chip" id="edit-unit-btn" type="button" disabled>Edit</button>
          </nav>

          <div class="unit-hero" id="unit-hero"></div>

          <div class="tabs" id="tabs">
            <button class="tab-btn active" id="tab-overview-btn" type="button" data-tab="overview">Overview</button>
            <button class="tab-btn" id="tab-maint-btn" type="button" data-tab="maintenance">Maintenance</button>
            <button class="tab-btn" id="tab-docs-btn" type="button" data-tab="documents">Documents</button>
          </div>

          <div class="tab-content active" id="tab-overview"></div>
          <div class="tab-content" id="tab-maintenance"></div>
          <div class="tab-content" id="tab-documents"></div>
        </div>

        <div class="drawer-overlay" id="drawer-overlay"></div>
        <div class="drawer" id="notif-drawer" aria-hidden="true">
          <div class="drawer-handle"></div>
          <div class="drawer-header">
            <div class="drawer-title">Notifications</div>
            <button class="drawer-close" id="drawer-close" type="button" aria-label="Close notifications">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 6 6 18M6 6l12 12"></path>
              </svg>
            </button>
          </div>
          <div class="notif-list" id="notif-list"></div>
        </div>

        <div class="modal-overlay" id="edit-modal-overlay"></div>
        <div class="modal" id="edit-modal" aria-hidden="true">
          <div class="modal-handle"></div>
          <div class="modal-header">
            <div class="modal-title" id="edit-modal-title">Edit Unit</div>
            <button class="modal-close" id="edit-modal-close" type="button" aria-label="Close editor">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="M18 6 6 18M6 6l12 12"></path>
              </svg>
            </button>
          </div>
          <form class="modal-form" id="edit-unit-form"></form>
        </div>
      </div>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
